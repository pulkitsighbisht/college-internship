  <main class="contact-main">
    <div class="form-container">
      <h1>Let's Create Together</h1>
      
      <form class="form" onsubmit="event.preventDefault();">
        <div class="input-group">
          <label class="label" for="name">Your Full Name</label>
          <input class="input" type="text" id="name" placeholder="John Doe" required>
        </div>
        
        <div class="input-group">
          <label class="label" for="email">Your Best E-Mail Address</label>
          <input class="input" type="email" id="email" placeholder="john.doe@email.com" required>
        </div>
        
        <div class="input-group">
          <label class="label" for="message">How can I help you?</label>
          <textarea class="textarea" id="message" placeholder="A brief description of your project..." required></textarea> 
        </div>
        
        <button type="submit" class="btn primary contact-btn">Send Message</button>
      </form>
    </div>
  </main>
